<!DOCTYPE html>
<html>
<head>
<title>Teacher Panel</title>
</head>
<body>

<h1>Teacher Panel</h1>

<h2>Create Assignment</h2>
<input id="classID" placeholder="Class ID">
<input id="title" placeholder="Assignment Title">
<input id="dueDate" placeholder="Due Date">
<button id="createAssignmentBtn">Create</button>

<hr>

<h2>Enter Grade</h2>
<input id="studentID" placeholder="Student ID">
<input id="assignmentID" placeholder="Assignment ID">
<input id="score" placeholder="Score">
<button id="submitGradeBtn">Submit Grade</button>

<br><br>
<button id="logoutBtn">Logout</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script src="teacher.js"></script>

</body>
</html>
